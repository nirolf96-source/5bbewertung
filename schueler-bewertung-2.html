<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live-Bewertung</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@600&display=swap');

:root {
  --bg:     #0b0d14;
  --card:   #13162080;
  --border: #1e2236;
  --text:   #dde1f5;
  --muted:  #3d4260;
  --green:  #27d98c;
  --red:    #f0443a;
  --white:  #eef0ff;
  --gold:   #f5c842;
  --silver: #a8b8d0;
  --bronze: #d4845a;
  --accent: #5b6cf9;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── TOP BAR ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: #0d0f18;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.topbar h1 {
  font-size: 1rem;
  font-weight: 800;
  color: #fff;
  letter-spacing: -.02em;
  margin-right: 4px;
}

.topbar input {
  background: #181b28;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 12px;
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: .85rem;
  outline: none;
  width: 160px;
  transition: border-color .2s;
}
.topbar input:focus { border-color: var(--accent); }
.topbar input::placeholder { color: var(--muted); }

.tbtn {
  padding: 7px 13px;
  border: none; border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: .82rem; font-weight: 600;
  cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.tbtn-add   { background: var(--accent); color: #fff; }
.tbtn-add:hover { background: #4a5be8; }
.tbtn-sm    { background: #181b28; color: var(--muted); border: 1px solid var(--border); }
.tbtn-sm:hover  { color: var(--text); border-color: var(--muted); }
.tbtn-preset { background: #181b28; color: #6a70a0; border: 1px solid var(--border); font-size: .78rem; }
.tbtn-preset:hover { color: var(--text); border-color: var(--accent); }

.spacer { flex: 1; }

/* ── MAIN SCROLL AREA ── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px 20px;
  scrollbar-width: thin;
  scrollbar-color: #1e2236 transparent;
}
.main::-webkit-scrollbar { width: 5px; }
.main::-webkit-scrollbar-thumb { background: #1e2236; border-radius: 4px; }

/* ── ROW LIST ── */
.row-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

/* ── STUDENT ROW ── */
.srow {
  display: grid;
  grid-template-columns: 26px 130px 1fr 52px 62px;
  align-items: center;
  gap: 10px;
  background: #13162060;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 7px 10px;
  transition: border-color .3s, background .3s;
  position: relative;
}

.srow::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 10px 0 0 10px;
  background: var(--row-left, var(--border));
  transition: background .4s;
}

/* rank badge */
.rank-badge {
  font-size: .75rem;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  text-align: center;
  line-height: 1;
}
.rank-badge.g { color: var(--gold); }
.rank-badge.s { color: var(--silver); }
.rank-badge.b { color: var(--bronze); }

/* name */
.sname {
  font-size: .88rem;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* bar */
.bar-wrap {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.bar-track {
  height: 10px;
  background: #080a10;
  border-radius: 999px;
  overflow: hidden;
  display: flex;
  position: relative;
}
.bar-track::after {
  content: '';
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 1px;
  background: rgba(255,255,255,.1);
  transform: translateX(-50%);
}
.t-r { background: var(--red);   border-radius: 999px 0 0 999px; flex-shrink:0; height:100%; transition: width .45s cubic-bezier(.4,0,.2,1); }
.t-w { background: var(--white); flex-shrink:0; height:100%; transition: width .45s cubic-bezier(.4,0,.2,1); }
.t-g { background: var(--green); border-radius: 0 999px 999px 0; flex-shrink:0; height:100%; transition: width .45s cubic-bezier(.4,0,.2,1); }

/* buttons */
.vote-btns {
  display: flex;
  gap: 5px;
  align-items: center;
}
.vbtn {
  width: 22px; height: 22px;
  border-radius: 6px; border: none;
  font-size: .85rem; font-weight: 800;
  cursor: pointer; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: all .1s;
  flex-shrink: 0;
}
.vbtn:active { transform: scale(.82); }
.vbtn-plus  { background: rgba(39,217,140,.15); color: var(--green); }
.vbtn-plus:hover  { background: rgba(39,217,140,.3); }
.vbtn-minus { background: rgba(240,68,58,.12); color: var(--red); }
.vbtn-minus:hover { background: rgba(240,68,58,.25); }

/* score */
.score-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: .95rem;
  font-weight: 700;
  text-align: right;
  transition: color .4s;
}

/* animations */
@keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.35)} 100%{transform:scale(1)} }
.pop { animation: pop .2s ease; }
@keyframes flash-green { 0%{background:#0d2a1a} 100%{background:#13162060} }
@keyframes flash-red   { 0%{background:#2a0d0d} 100%{background:#13162060} }
.flash-g { animation: flash-green .4s ease; }
.flash-r { animation: flash-red   .4s ease; }

.empty {
  text-align: center; color: var(--muted);
  padding: 60px 20px; font-size: .9rem;
}
.empty span { font-size: 2rem; display: block; margin-bottom: 10px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <h1>📋 Live-Bewertung</h1>

  <input type="text" id="nameInput" placeholder="Name …" onkeydown="if(event.key==='Enter')addStudent()">
  <button class="tbtn tbtn-add" onclick="addStudent()">+ Hinzufügen</button>
  <button class="tbtn tbtn-preset" onclick="loadPreset(['Elias','Vahid','Tetiana','Adriana','Amelie','Öykü','Rudy','Ayuob','Julian','Saven','Joline','Mio','Zain','Efe','Patrizia','Denis','Sina','Mats','Erika','Mavin','Bruno'])">Klasse laden</button>

  <div class="spacer"></div>
  <button class="tbtn tbtn-sm" onclick="resetAll()">↺ Reset</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="row-list" id="rowList">
    <div class="empty"><span>🎓</span>Noch keine Schüler.<br>Namen eingeben oder Demo laden.</div>
  </div>
</div>

<script>
const MAX = 10; // max points in one direction

let students = JSON.parse(localStorage.getItem('bew4') || '[]');

function save() { localStorage.setItem('bew4', JSON.stringify(students)); }

function scoreColor(s) {
  if (s > 0) return '#27d98c';
  if (s < 0) return '#f0443a';
  return '#5c6480';
}

function barSegs(s) {
  const p = s / MAX; // -1..+1
  if (p >= 0) {
    const g = Math.round(p * 50);
    return { r: 0, w: 100 - g, g };
  } else {
    const r = Math.round(-p * 50);
    return { r, w: 100 - r, g: 0 };
  }
}

// sorted indices (desc score, then name)
function sortedOrder() {
  return students
    .map((s, i) => ({ i, score: s.score, name: s.name }))
    .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name))
    .map(x => x.i);
}

function rankLabel(rank) {
  if (rank === 0) return { txt: '🥇', cls: 'g' };
  if (rank === 1) return { txt: '🥈', cls: 's' };
  if (rank === 2) return { txt: '🥉', cls: 'b' };
  return { txt: `#${rank + 1}`, cls: '' };
}

// ── Full render ──────────────────────────────────────────
function render() {
  const list = document.getElementById('rowList');
  if (!students.length) {
    list.innerHTML = '<div class="empty"><span>🎓</span>Noch keine Schüler.<br>Namen eingeben oder Demo laden.</div>';
    return;
  }

  const order = sortedOrder();
  list.innerHTML = order.map((si, rank) => {
    const s = students[si];
    const seg = barSegs(s.score);
    const col = scoreColor(s.score);
    const sign = s.score > 0 ? '+' : '';
    const { txt, cls } = rankLabel(rank);
    const leftCol = s.score > 1 ? '#27d98c' : s.score < -1 ? '#f0443a' : '#1e2236';

    return `
      <div class="srow" id="srow-${si}" style="--row-left:${leftCol}">
        <div class="rank-badge ${cls}">${txt}</div>
        <div class="sname">${esc(s.name)}</div>
        <div class="bar-wrap">
          <div class="bar-track">
            <div class="t-r" id="tr-${si}" style="width:${seg.r}%"></div>
            <div class="t-w" id="tw-${si}" style="width:${seg.w}%"></div>
            <div class="t-g" id="tg-${si}" style="width:${seg.g}%"></div>
          </div>
        </div>
        <div class="vote-btns">
          <button class="vbtn vbtn-minus" onclick="vote(${si},-1)">−</button>
          <button class="vbtn vbtn-plus"  onclick="vote(${si}, 1)">+</button>
        </div>
        <div class="score-val" id="sv-${si}" style="color:${col}">${sign}${s.score}</div>
      </div>`;
  }).join('');
}

// ── Vote (DOM patch + resort) ────────────────────────────
function vote(si, delta) {
  students[si].score = Math.max(-MAX, Math.min(MAX, students[si].score + delta));
  save();

  // patch bar + score in place
  const seg  = barSegs(students[si].score);
  const col  = scoreColor(students[si].score);
  const sign = students[si].score > 0 ? '+' : '';
  const leftCol = students[si].score > 1 ? '#27d98c' : students[si].score < -1 ? '#f0443a' : '#1e2236';

  const row = document.getElementById(`srow-${si}`);
  document.getElementById(`tr-${si}`).style.width = seg.r + '%';
  document.getElementById(`tw-${si}`).style.width = seg.w + '%';
  document.getElementById(`tg-${si}`).style.width = seg.g + '%';

  const sv = document.getElementById(`sv-${si}`);
  sv.style.color = col;
  sv.textContent = sign + students[si].score;
  sv.classList.remove('pop');
  void sv.offsetWidth;
  sv.classList.add('pop');

  row.style.setProperty('--row-left', leftCol);
  row.classList.remove('flash-g', 'flash-r');
  void row.offsetWidth;
  row.classList.add(delta > 0 ? 'flash-g' : 'flash-r');

  // re-sort DOM without full re-render
  resortDOM();
}

function resortDOM() {
  const list = document.getElementById('rowList');
  const order = sortedOrder();
  const medals = ['g','s','b'];

  order.forEach((si, rank) => {
    const row = document.getElementById(`srow-${si}`);
    if (!row) return;
    list.appendChild(row); // moves to end in sorted order

    const badge = row.querySelector('.rank-badge');
    const { txt, cls } = rankLabel(rank);
    badge.textContent = txt;
    badge.className = 'rank-badge' + (cls ? ' ' + cls : '');
  });
}

// ── CRUD ─────────────────────────────────────────────────
function addStudent() {
  const inp = document.getElementById('nameInput');
  const name = inp.value.trim();
  if (!name) return;
  students.push({ name, score: 0 });
  save(); inp.value = '';
  render();
}

function removeStudent(si) {
  students.splice(si, 1);
  save(); render();
}

function resetAll() {
  if (!confirm('Alle Bewertungen zurücksetzen?')) return;
  students.forEach(s => s.score = 0);
  save(); render();
}

function loadPreset(names) {
  students = names.map(n => ({ name: n, score: 0 }));
  save(); render();
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Always load real class if saved data contains unknown names (= old demo)
const CLASS = ['Elias','Vahid','Tetiana','Adriana','Amelie','Öykü','Rudy','Ayuob','Julian','Saven','Joline','Mio','Zain','Efe','Patrizia','Denis','Sina','Mats','Erika','Mavin','Bruno'];
const savedNames = students.map(s => s.name);
const hasDemo = !students.length || savedNames.some(n => !CLASS.includes(n));
if (hasDemo) { loadPreset(CLASS); } else { render(); }
</script>
</body>
</html>
